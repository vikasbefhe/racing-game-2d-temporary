
<!DOCTYPE html>
<html>
<head>
<title>Pro Racing Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
text-align:center;
color:white;
}

#menu{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
}

#menu button{
padding:15px 30px;
font-size:20px;
cursor:pointer;
}

#score{
position:absolute;
top:10px;
left:10px;
font-size:18px;
z-index:2;
}

#leaderboard{
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:8px;
font-size:14px;
}

.gameArea{
width:100vw;
height:100vh;
position:relative;
overflow:hidden;
background-image:url("https://i.imgur.com/2R8KJ7G.jpg");
background-size:cover;
background-position:center;
}

.line{
width:10px;
height:100px;
background:white;
position:absolute;
left:50%;
transform:translateX(-50%);
}

.car{
width:60px;
height:100px;
position:absolute;
bottom:20px;
left:45%;
background:url("https://i.imgur.com/7Q8FQ0N.png");
background-size:cover;
}

.enemyCar{
width:60px;
height:100px;
position:absolute;
top:-120px;
background:url("https://i.imgur.com/YqQK0ZP.png");
background-size:cover;
}

</style>
</head>

<body>

<div id="menu">
<h1>🏁 Racing Game</h1>
<button onclick="startGame()">Start Game</button>
</div>

<div id="score">Score: 0</div>

<div id="leaderboard">
<b>Leaderboard</b>
<div id="scores"></div>
</div>

<div class="gameArea" id="gameArea">
<div class="car" id="playerCar"></div>
</div>

<script>

let car=document.getElementById("playerCar");
let gameArea=document.getElementById("gameArea");
let scoreBox=document.getElementById("score");

let position=window.innerWidth/2;
let score=0;
let speed=6;
let gameRunning=false;

let leaderboard=JSON.parse(localStorage.getItem("leaderboard")) || [];

function showLeaderboard(){

let html="";

leaderboard.slice(0,5).forEach((s,i)=>{
html+=(i+1)+". "+s+"<br>";
});

document.getElementById("scores").innerHTML=html;

}

showLeaderboard();

/* road lines */
for(let i=0;i<6;i++){
let line=document.createElement("div");
line.classList.add("line");
line.style.top=(i*150)+"px";
gameArea.appendChild(line);
}

/* start game */
function startGame(){

document.getElementById("menu").style.display="none";

score=0;
speed=6;
position=window.innerWidth/2;

car.style.left=position+"px";

gameRunning=true;

}

/* keyboard control */
document.addEventListener("keydown",function(e){

if(!gameRunning) return;

if(e.key==="ArrowLeft") moveLeft();
if(e.key==="ArrowRight") moveRight();

});

/* touch control */
gameArea.addEventListener("touchmove",function(e){

let x=e.touches[0].clientX;

if(x<window.innerWidth/2){
moveLeft();
}else{
moveRight();
}

});

/* movement */
function moveLeft(){

position-=30;
if(position<0) position=0;

car.style.left=position+"px";

}

function moveRight(){

position+=30;
if(position>window.innerWidth-60)
position=window.innerWidth-60;

car.style.left=position+"px";

}

/* enemy */
function createEnemy(){

if(!gameRunning) return;

let enemy=document.createElement("div");

enemy.classList.add("enemyCar");

enemy.style.left=Math.random()*(window.innerWidth-60)+"px";

gameArea.appendChild(enemy);

moveEnemy(enemy);

}

function moveEnemy(enemy){

let top=-120;

let move=setInterval(function(){

if(!gameRunning){
clearInterval(move);
return;
}

top+=speed;

enemy.style.top=top+"px";

if(top>window.innerHeight){
enemy.remove();
clearInterval(move);
}

if(checkCollision(enemy)){

gameOver();

}

},40);

}

/* road lines */
function moveLines(){

if(!gameRunning) return;

let lines=document.querySelectorAll(".line");

lines.forEach(function(line){

let top=parseInt(line.style.top);

top+=speed;

if(top>window.innerHeight){

top=-100;

score++;

scoreBox.innerText="Score: "+score;

}

line.style.top=top+"px";

});

gameArea.style.backgroundPositionY=
(parseInt(gameArea.style.backgroundPositionY||0)+speed)+"px";

}

/* collision */
function checkCollision(enemy){

let a=car.getBoundingClientRect();
let b=enemy.getBoundingClientRect();

return !(a.bottom<b.top ||
a.top>b.bottom ||
a.right<b.left ||
a.left>b.right);

}

/* game over */
function gameOver(){

gameRunning=false;

leaderboard.push(score);

leaderboard.sort((a,b)=>b-a);

leaderboard=leaderboard.slice(0,5);

localStorage.setItem("leaderboard",JSON.stringify(leaderboard));

showLeaderboard();

alert("Game Over! Score: "+score);

document.getElementById("menu").style.display="block";

}

/* loops */
setInterval(createEnemy,2000);
setInterval(moveLines,40);

</script>

</body>
</html>
