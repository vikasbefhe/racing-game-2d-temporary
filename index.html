<!DOCTYPE html>
<html>
<head>
<title>2D Racing Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>

body{
text-align:center;
background:#ccc;
font-family:Arial;
margin:0;
}

/* loading screen */
#loading{
position:fixed;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:30px;
z-index:10;
}

/* menu */
#menu{
display:none;
margin-top:40px;
}

#menu button{
padding:15px 30px;
font-size:20px;
cursor:pointer;
}

/* score */
#score{
font-size:20px;
margin:10px;
}

/* game area */
.gameArea{
width:320px;
height:520px;
margin:auto;
position:relative;
overflow:hidden;
border:4px solid black;

background:
linear-gradient(to right,
green 0%,
green 20%,
#333 20%,
#333 80%,
green 80%,
green 100%);
}

/* road lines */
.line{
width:10px;
height:100px;
background:white;
position:absolute;
left:155px;
}

/* player car */
.car{
width:50px;
height:80px;
background:red;
position:absolute;
bottom:20px;
left:130px;
border-radius:8px;
}

/* enemy vehicles */
.enemyCar{
width:50px;
height:80px;
background:yellow;
position:absolute;
top:-80px;
border-radius:8px;
}

.truck{
width:60px;
height:100px;
background:blue;
position:absolute;
top:-100px;
border-radius:6px;
}

.bus{
width:60px;
height:110px;
background:orange;
position:absolute;
top:-110px;
border-radius:6px;
}

/* buttons */
.controls{
margin-top:10px;
}

.controls button{
width:90px;
padding:10px;
font-size:16px;
margin:5px;
}

</style>
</head>

<body>

<div id="loading">
🚗 Racing Game<br>
Loading...
</div>

<div id="menu">
<h1>🏁 2D Racing Game</h1>
<button onclick="startGame()">Start Game</button>
</div>

<div id="score">Score: 0</div>

<div class="gameArea" id="gameArea">
<div class="car" id="playerCar"></div>
</div>

<div class="controls">
<button id="leftBtn">⬅ Left</button>
<button id="rightBtn">Right ➡</button>
<button onclick="nitro()">Nitro 🚀</button>
<button onclick="toggleMute()">🔇 Mute</button>
</div>

<audio id="engineSound" src="https://actions.google.com/sounds/v1/transportation/car_engine.ogg"></audio>
<audio id="crashSound" src="https://actions.google.com/sounds/v1/impacts/crash.ogg"></audio>
<audio id="nitroSound" src="https://actions.google.com/sounds/v1/transportation/rocket_boost.ogg"></audio>

<script>

/* loading */
window.onload=function(){
setTimeout(function(){
document.getElementById("loading").style.display="none";
document.getElementById("menu").style.display="block";
},2000);
}

let car=document.getElementById("playerCar");
let gameArea=document.getElementById("gameArea");
let scoreBox=document.getElementById("score");

let engineSound=document.getElementById("engineSound");
let crashSound=document.getElementById("crashSound");
let nitroSound=document.getElementById("nitroSound");

let position=130;
let score=0;
let speed=5;
let gameRunning=false;
let muted=false;

let moveInterval;

/* road lines */
for(let i=0;i<5;i++){
let line=document.createElement("div");
line.classList.add("line");
line.style.top=(i*120)+"px";
gameArea.appendChild(line);
}

/* start game */
function startGame(){

document.getElementById("menu").style.display="none";

clearRoad();

score=0;
speed=5;
position=130;

car.style.left=position+"px";

gameRunning=true;

scoreBox.innerText="Score: 0";

engineSound.loop=true;

if(!muted){
engineSound.play();
}

}

/* move left */
function moveLeft(){
position-=10;
if(position<70) position=70;
car.style.left=position+"px";
}

/* move right */
function moveRight(){
position+=10;
if(position>200) position=200;
car.style.left=position+"px";
}

/* android touch controls */
document.getElementById("leftBtn").addEventListener("touchstart",function(){
moveInterval=setInterval(moveLeft,40);
});

document.getElementById("leftBtn").addEventListener("touchend",function(){
clearInterval(moveInterval);
});

document.getElementById("rightBtn").addEventListener("touchstart",function(){
moveInterval=setInterval(moveRight,40);
});

document.getElementById("rightBtn").addEventListener("touchend",function(){
clearInterval(moveInterval);
});

/* nitro */
function nitro(){

if(!gameRunning) return;

if(!muted) nitroSound.play();

speed+=5;

setTimeout(function(){
speed-=5;
},2000);

}

/* mute */
function toggleMute(){

muted=!muted;

if(muted){
engineSound.pause();
}else{
engineSound.play();
}

}

/* create enemy */
function createEnemy(){

if(!gameRunning) return;

let enemy=document.createElement("div");

let type=Math.floor(Math.random()*3);

if(type===0) enemy.classList.add("enemyCar");
else if(type===1) enemy.classList.add("truck");
else enemy.classList.add("bus");

enemy.style.left=(70+Math.random()*140)+"px";

gameArea.appendChild(enemy);

moveEnemy(enemy);

}

/* enemy movement */
function moveEnemy(enemy){

let top=-100;

let move=setInterval(function(){

if(!gameRunning){
clearInterval(move);
return;
}

top+=speed;

enemy.style.top=top+"px";

if(top>520){
enemy.remove();
clearInterval(move);
}

if(checkCollision(enemy)){

gameRunning=false;

engineSound.pause();

if(!muted) crashSound.play();

alert("Game Over! Score: "+score);

clearRoad();

document.getElementById("menu").style.display="block";

}

},50);

}

/* road animation */
function moveLines(){

if(!gameRunning) return;

let lines=document.querySelectorAll(".line");

lines.forEach(function(line){

let top=parseInt(line.style.top);

top+=speed;

if(top>520){
top=-100;
score++;
scoreBox.innerText="Score: "+score;

if(score%10===0) speed++;
}

line.style.top=top+"px";

});

}

/* collision */
function checkCollision(enemy){

let carRect=car.getBoundingClientRect();
let enemyRect=enemy.getBoundingClientRect();

return !(carRect.bottom<enemyRect.top ||
carRect.top>enemyRect.bottom ||
carRect.right<enemyRect.left ||
carRect.left>enemyRect.right);

}

/* clear road */
function clearRoad(){

let enemies=document.querySelectorAll(".enemyCar,.truck,.bus");

enemies.forEach(function(e){
e.remove();
});

}

/* loops */
setInterval(createEnemy,2000);
setInterval(moveLines,50);

</script>

</body>
</html>
